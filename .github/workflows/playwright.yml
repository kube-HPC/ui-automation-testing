name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps

  algorithms-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test tests/Algorithms --reporter=json
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: algorithms-results
          path: test-results/

  pipelines-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test tests/Pipelines --reporter=json
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: pipelines-results
          path: test-results/

  monitoring-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test tests/Monitoring --reporter=json
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: monitoring-results
          path: test-results/

  jobs-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test tests/jobs --reporter=json
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: jobs-results
          path: test-results/

  flows-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test tests/Flows --reporter=json
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: flows-results
          path: test-results/

  report:
    if: ${{ always() }}
    needs:
      [
        algorithms-tests,
        pipelines-tests,
        monitoring-tests,
        jobs-tests,
        flows-tests,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-results

      - run: |
          mkdir merged
          find all-results -name "*.json" -exec cp {} merged/ \;

      - name: Publish Playwright summary
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const dir = 'merged';

          if (!summaryFile || !fs.existsSync(dir)) process.exit(0);

          const counters = {
            passed: 0,
            failed: 0,
            flaky: 0,
            skipped: 0,
            timedOut: 0,
            interrupted: 0,
          };

          const failedTests = [];

          const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));

          const visitSuite = (suite, parentTitles = []) => {
            const currentTitles = suite.title ? [...parentTitles, suite.title] : parentTitles;

            for (const spec of suite.specs || []) {
              const specTitles = [...currentTitles, spec.title].filter(Boolean);

              for (const test of spec.tests || []) {
                const results = test.results || [];
                const hasExpectedPass = results.some(r => r.status === 'passed');

                if (test.status === 'expected' && hasExpectedPass) counters.passed++;
                else if (test.status === 'flaky') counters.flaky++;
                else if (test.status === 'skipped') counters.skipped++;
                else if (test.status === 'unexpected') {
                  counters.failed++;
                  failedTests.push(specTitles.join(' > '));
                }
              }
            }

            for (const child of suite.suites || []) {
              visitSuite(child, currentTitles);
            }
          };

          for (const file of files) {
            const report = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf8'));
            visitSuite(report);
          }

          const lines = [
            '## Playwright Test Summary',
            '',
            '| Status | Count |',
            '| --- | ---: |',
            `| Passed | ${counters.passed} |`,
            `| Failed | ${counters.failed} |`,
            `| Flaky | ${counters.flaky} |`,
            `| Skipped | ${counters.skipped} |`,
          ];

          fs.appendFileSync(summaryFile, lines.join('\n'));
          EOF
