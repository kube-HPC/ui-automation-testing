name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - name: Publish Playwright summary
        if: ${{ always() && !cancelled() }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const resultsPath = 'test-results/results.json';

          if (!summaryFile) {
            process.exit(0);
          }

          if (!fs.existsSync(resultsPath)) {
            fs.appendFileSync(summaryFile, '## Playwright Test Summary\n\nNo JSON test results were generated.\n');
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
          const counters = {
            passed: 0,
            failed: 0,
            flaky: 0,
            skipped: 0,
            timedOut: 0,
            interrupted: 0,
          };
          const failedTests = [];

          const visitSuite = (suite, parentTitles = []) => {
            const currentTitles = suite.title ? [...parentTitles, suite.title] : parentTitles;

            for (const spec of suite.specs || []) {
              const specTitles = [...currentTitles, spec.title].filter(Boolean);

              for (const test of spec.tests || []) {
                const projectName = test.projectName ? ` [${test.projectName}]` : '';
                const title = `${specTitles.join(' > ')}${projectName}`;
                const results = test.results || [];
                const hasExpectedPass = results.some((result) => result.status === 'passed');

                if (test.status === 'expected' && hasExpectedPass) {
                  counters.passed += 1;
                  continue;
                }

                if (test.status === 'flaky') {
                  counters.flaky += 1;
                  continue;
                }

                if (test.status === 'skipped') {
                  counters.skipped += 1;
                  continue;
                }

                if (test.status === 'unexpected') {
                  const lastResult = results[results.length - 1];

                  if (lastResult?.status === 'timedOut') {
                    counters.timedOut += 1;
                  } else if (lastResult?.status === 'interrupted') {
                    counters.interrupted += 1;
                  } else {
                    counters.failed += 1;
                  }

                  const errorMessage = lastResult?.error?.message || lastResult?.errors?.[0]?.message || 'No error message';
                  failedTests.push({
                    title,
                    status: lastResult?.status || test.status,
                    errorMessage: errorMessage.split('\n')[0],
                  });
                  continue;
                }

                if (test.status === 'interrupted') {
                  counters.interrupted += 1;
                }
              }
            }

            for (const child of suite.suites || []) {
              visitSuite(child, currentTitles);
            }
          };

          visitSuite(report);

          const lines = [
            '## Playwright Test Summary',
            '',
            '| Status | Count |',
            '| --- | ---: |',
            `| Passed | ${counters.passed} |`,
            `| Failed | ${counters.failed} |`,
            `| Flaky | ${counters.flaky} |`,
            `| Timed out | ${counters.timedOut} |`,
            `| Skipped | ${counters.skipped} |`,
            `| Interrupted | ${counters.interrupted} |`,
          ];

          if (failedTests.length) {
            lines.push('', '### Failed tests', '');
            for (const failedTest of failedTests) {
              lines.push(`- ${failedTest.title} (${failedTest.status})`);
              lines.push(`  - ${failedTest.errorMessage}`);
            }
          }

          fs.appendFileSync(summaryFile, `${lines.join('\n')}\n`);
          EOF
      - uses: actions/upload-artifact@v4
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ always() && !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30
